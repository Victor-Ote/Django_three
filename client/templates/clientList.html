{% extends 'base.html' %}
{% load static %}
{% block content %}
<section class="page" id="clients">
    <div class="page-actions">
        <div>
            <h2>{{ title }}</h2>
            <p>Modelo de listagem para cadastro de clientes. Total de clientes: {{ total }}</p>
        </div>
        <button onclick="window.location.href = '{% url 'client:create' %}'" class="btn primary"
            data-modal="modalCliente">Novo Cliente</button>
    </div>

</section>


{% endblock %}
