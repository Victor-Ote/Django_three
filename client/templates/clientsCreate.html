{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="page" id="clients">
    <div class="page-actions">
        <div>
            <h2>{{ title }}</h2>
        </div>
        <button onclick="window.location.href = '{% url 'client:client' %}'" class="btn primary"
            data-modal="modalProduto">Voltar</button>
    </div>

    <section class="card form-card">
        <form method="POST">
            {% csrf_token %}

            <div class="form-section">
                <h3>Dados do Cliente</h3>

                <div class="form-row">
                    <div class="form-group middle">
                        <label for="{{ form.name.id_for_label }}">Nome</label>
                        {{ form.name }}
                        {{ form.name.errors }}
                    </div>

                    <div class="form-group middle">
                        <label for="{{ form.doc_number.id_for_label }}">CPF/CNPJ</label>
                        {{ form.doc_number }}
                        {{ form.doc_number.errors }}
                    </div>
                </div>
                <div class="form-actions">
                    <a href="{% url 'client:client' %}" class="btn-cancel">Cancelar</a>
                    <button type="submit" class="btn primary">Salvar Cliente</button>
                </div>
        </form>
    </section>
</section>

{% endblock %}
