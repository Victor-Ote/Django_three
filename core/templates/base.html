{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP Básico</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">ERP</span>
        <div>
          <strong>Meu Sistema</strong>
          <small>Gestão Comercial</small>
        </div>
      </div>

      <nav class="sidebar-menu">
        <button class="menu-item active" data-page="dashboard">Dashboard</button>
        <button class="menu-item" data-page="produtos">Produtos</button>
        <button class="menu-item" data-page="clientes">Clientes</button>
        <button class="menu-item" data-page="pedidos">Pedidos de Venda</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="mobile-menu" id="mobileMenu">☰</button>
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p>Seu ERP Prático e simples!</p>
        </div>
      </header>
      {% block content %}
      {% endblock %}
    </main>
  </div>

  <div class="modal" id="modalProduto">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Novo Produto</h2>
        <button class="close-modal">×</button>
      </div>
      <form class="form-grid">
        <label>Código<input type="text" placeholder="PRD001" /></label>
        <label>Nome do produto<input type="text" placeholder="Nome do produto" /></label>
        <label>Categoria<input type="text" placeholder="Categoria" /></label>
        <label>Estoque<input type="number" placeholder="0" /></label>
        <label>Preço<input type="text" placeholder="R$ 0,00" /></label>
        <label>Status<select><option>Ativo</option><option>Inativo</option></select></label>
        <div class="form-actions"><button type="button" class="btn secondary close-modal">Cancelar</button><button type="button" class="btn primary">Salvar</button></div>
      </form>
    </div>
  </div>

  <div class="modal" id="modalCliente">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Novo Cliente</h2>
        <button class="close-modal">×</button>
      </div>
      <form class="form-grid">
        <label>Nome/Razão Social<input type="text" /></label>
        <label>CPF/CNPJ<input type="text" /></label>
        <label>Telefone<input type="text" /></label>
        <label>E-mail<input type="email" /></label>
        <label>Cidade<input type="text" /></label>
        <label>Status<select><option>Ativo</option><option>Inativo</option></select></label>
        <div class="form-actions"><button type="button" class="btn secondary close-modal">Cancelar</button><button type="button" class="btn primary">Salvar</button></div>
      </form>
    </div>
  </div>

  <div class="modal" id="modalPedido">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Novo Pedido</h2>
        <button class="close-modal">×</button>
      </div>
      <form class="form-grid">
        <label>Cliente<select><option>Clínica Exemplo LTDA</option><option>Dental Sul</option></select></label>
        <label>Produto<select><option>Kit Espátulas Essentials</option><option>Kit Curetas Gracey</option></select></label>
        <label>Quantidade<input type="number" /></label>
        <label>Valor unitário<input type="text" /></label>
        <label>Data do pedido<input type="date" /></label>
        <label>Status<select><option>Aberto</option><option>Finalizado</option><option>Cancelado</option></select></label>
        <div class="form-actions"><button type="button" class="btn secondary close-modal">Cancelar</button><button type="button" class="btn primary">Salvar</button></div>
      </form>
    </div>
  </div>

  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
